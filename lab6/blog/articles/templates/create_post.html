{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Создать статью</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <div class="header-container">
            <img src="{% static 'img/dpb-logo.png' %}" alt="Logo">
            <a href="/" class="all-articles-link">Все статьи</a>
        </div>
    </div>
    <div class="content">
        <div class="form-container">
            <h1>Написать статью</h1>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="title" placeholder="Название статьи" value="{{ form.title }}">
                <textarea name="text" placeholder="Текст статьи">{{ form.text }}</textarea>
                <input type="submit" value="Сохранить" class="btn-save">
            </form>
            {% if form.errors %}
                <p class="error-msg">{{ form.errors }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
